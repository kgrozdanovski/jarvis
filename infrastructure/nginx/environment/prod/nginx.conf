user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Upstream definition for Uvicorn server
    upstream uvicorn {
        server backend:8080;  # This assumes your Uvicorn server is accessible via this host and port in the Docker network
    }

    upstream socketio_nodes {
        ip_hash;
        server backend:8080;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Prefer 1.3, fallback to 1.2, reject all others
    ssl_protocols TLSv1.2 TLSv1.3;

    # A list of all ciphers to permit, sorted most to least preferred. ! indicates ciphers to reject.
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:ECDHE-RSA-AES128-GCM-SHA256:AES256+EECDH:DHE-RSA-AES128-GCM-SHA256:AES256+EDH:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA:ECDHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA256:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA:ECDHE-RSA-DES-CBC3-SHA:EDH-RSA-DES-CBC3-SHA:AES256-GCM-SHA384:AES128-GCM-SHA256:AES256-SHA256:AES128-SHA256:AES256-SHA:AES128-SHA:DES-CBC3-SHA:HIGH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4";

    # Share the cache with all worker processes across cores; Name the cache SSL; Set to 5 min
    ssl_session_cache shared:SSL:5m;

    # Add HSTS header to all requests to force browsers to use HTTPS
    add_header Strict-Transport-Security "max-age=15768000, includeSubDomains" always;

    # Cloudflare real IP restoration
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Truncate IP for privacy (zero last octet for IPv4, collapse last group for IPv6)
    map $remote_addr $ip_truncated {
        ~(?P<ip>\d+\.\d+\.\d+)\.\d+     $ip.0;
        ~(?P<ip>[0-9a-f:]+:[0-9a-f]+)   $ip::;
        default                           0.0.0.0;
    }

    log_format combined_truncated '$ip_truncated - $remote_user [$time_local] '
                                   '"$request" $status $body_bytes_sent '
                                   '"$http_referer" "$http_user_agent" '
                                   '"$http_cf_ipcountry"';

    access_log  /var/log/nginx/access.log  combined_truncated;

    server_tokens off;

    sendfile        on;

    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    include /etc/nginx/conf.d/*.conf;
}
