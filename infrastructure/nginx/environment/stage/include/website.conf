server {
    listen 80;
    listen [::]:80;

    server_name stage.jarvis.local;
    server_tokens off;

    location / {
        return 301 https://stage.jarvis.local$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;

    server_name www.stage.jarvis.local;
    server_tokens off;

    location / {
        return 301 https://stage.jarvis.local$request_uri;
    }
}

server {
    # Listen on UDP for QUIC+HTTP/3
    # reuseport option is supported only for 1 virtual host per the same listen IP:PORT directive.
    listen 443 quic;
    listen [::]:443 quic;

    # Listen on standard HTTP/2 and HTTPS ports
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name stage.jarvis.local;

    http2 on;

    index index.html;
    root /var/www/html/frontend/.output/public;

    # Compression for public frontend traffic only
    gzip  on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml application/font-woff2 application/x-font-woff;

    # SSL configuration
    ssl_certificate     /etc/letsencrypt/live/stage.jarvis.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.jarvis.local/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    error_log  /var/log/nginx/stage-jarvis.error.log;
    access_log /var/log/nginx/stage-jarvis.access.log combined_truncated;

    # Do not send backend errors to client
    proxy_intercept_errors on;
    client_max_body_size 200M;

    # Increase default request timeout from 60 to 300 seconds
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # If no content-type, assume JSON
    default_type text/html;

    # Advertise that QUIC is available
    add_header Alt-Svc 'h3=":443"; ma=86400;';
    # 0-RTT QUIC connection resumption
    ssl_early_data on;

    # Security headers aligned with app route rules
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    autoindex off;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;

    location / {
        # Serve generated route HTML directly so canonical no-slash URLs do not redirect to trailing-slash directories.
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|js|woff|woff2|ttf|svg|otf)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    location ~* \.(js|css)$ {
        expires 1y;
        log_not_found off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    location ^~ /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    location ^~ /_ipx/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ \.mp4$ {
        root /var/www/html;
        types {
            video/mp4 mp4;
        }
        try_files $uri =404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;

    server_name www.stage.jarvis.local;

    ssl_certificate     /etc/letsencrypt/live/stage.jarvis.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.jarvis.local/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    return 301 https://stage.jarvis.local$request_uri;
}
