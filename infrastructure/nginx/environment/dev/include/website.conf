server {
    listen 80;
    listen [::]:80;
    
    # Redirect all HTTP requests to HTTPS with a 301 Moved Permanently response.
    return 301 https://$host$request_uri;
}

server {
    # Listen on UDP for QUIC+HTTP/3
    # reuseport option is supported only for 1 virtual host per the same listen IP:PORT directive.
    listen 443 quic;
    listen [::]:443 quic;

    # Listen on standard HTTP/2 and HTTPS ports
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name poliro.local www.poliro.local;
    
    http2 on;

    index index.html;
    root /var/www/html/frontend/.output/public;

    # SSL configuration
    ssl_certificate     /etc/nginx/selfsigned/fullchain.pem;
    ssl_certificate_key /etc/nginx/selfsigned/privkey.pem;
    # TLSv1.3 is required for QUIC.
    ssl_protocols TLSv1.2 TLSv1.3;  # Use only modern, secure TLS versions

    error_log  /var/log/nginx/poliro-com.error.log;
    access_log /var/log/nginx/poliro-com.access.log combined_truncated;

    # Do not send backend errors to client
    proxy_intercept_errors on;
    client_max_body_size 200M;

    # Increase default request timeout from 60 to 300 seconds
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # If no content-type, assume JSON
    default_type text/html;

    # Advertise that QUIC is available
    add_header Alt-Svc 'h3=":443"; ma=86400;';
    # 0-RTT QUIC connection resumption
    ssl_early_data on;

    autoindex off;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;

    location / {
        # Serve generated route HTML directly so canonical no-slash URLs do not redirect to trailing-slash directories.
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|js|woff|woff2|ttf|svg|otf)$ {
        access_log off;
        expires max;
    }

    location ~* \.(js|css)$ {
        expires 1y;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ \.mp4$ {
        root /var/www/html;
        types {
            video/mp4 mp4;
        }
        try_files $uri =404;
    }
}
