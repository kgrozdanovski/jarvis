# Warning: Do not deploy this file to production!
services:
  backend:
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/code
      - backend-storage:/code/storage:rw

  database:
    command: [ "postgres", "-c", "log_statement=all", "-c", "log_destination=stderr" ]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    hostname: minio
    env_file:
      - "./.env"
    environment:
      MINIO_ROOT_USER: "${STORAGE_KEY}"
      MINIO_ROOT_PASSWORD: "${STORAGE_SECRET}"
      MINIO_BROWSER_REDIRECT_URL: "${STORAGE_EXTERNAL_HOSTNAME}:${STORAGE_PORT}"
    command: server /data --address ":9700" --console-address ":9701"
    ports:
      - target: 9701
        published: 9701
        host_ip: 127.0.0.1
        protocol: tcp
      - target: 9700
        published: 9700
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - minio-data:/data
    networks:
      - jarvis-internal

volumes:
  minio-data:
    driver: local
  backend-storage:
    driver: local
